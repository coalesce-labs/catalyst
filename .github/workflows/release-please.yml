name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # After a release is created, sync marketplace.json versions
      - name: Checkout (for marketplace sync)
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        uses: actions/checkout@v4

      - name: Sync marketplace.json versions
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: bash scripts/sync-marketplace-versions.sh

      - name: Commit marketplace.json update
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git diff --cached --quiet || git commit -m "chore: sync marketplace.json versions"
          git push
