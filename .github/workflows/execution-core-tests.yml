# execution-core-tests.yml
#
# Runs the stable execution-core unit-test suite on every PR and push to main
# that touches the execution-core source tree.
#
# REQUIRED-STATUS-CHECK OPERATOR NOTE (CTL-963)
# -----------------------------------------------
# After this workflow is merged, a repository admin must mark the job
#   execution-core-unit-tests
# as a REQUIRED status check on the main branch ruleset so that the auto-merge
# floor is enforced.
#
# Steps (GitHub UI path):
#   Settings → Branches → Branch protection rules → main
#   → "Require status checks to pass before merging"
#   → Search for and add: "execution-core-unit-tests"
#
# Or via gh CLI:
#   gh api repos/{owner}/{repo}/branches/main/protection \
#     --method PATCH \
#     --field required_status_checks='{"strict":true,"contexts":["execution-core-unit-tests"]}'
#
# The exact check name is: execution-core-unit-tests
# (matches the job id below — GitHub derives the check name from the job id)

name: Execution Core Unit Tests

on:
  pull_request:
    branches: [main]
    paths:
      - "plugins/dev/scripts/execution-core/**"
      # CTL-1348: the updater safety tests (updater/plugin-pull-defer.test.mjs) import and
      # gate the broker cutover invariant in broker/plugin-refresh.mjs, so a PR touching
      # only the broker must run this suite too (Codex P2).
      - "plugins/dev/scripts/broker/**"
      # CTL-1369: the catalyst-install launcher, the `catalyst` router, and the CLI
      # registration (install-cli.sh / check-setup.sh) are the production entry path to
      # `catalyst install|uninstall|reinstall`; changing them must run the smoke test below.
      - "plugins/dev/scripts/catalyst-install"
      - "plugins/dev/scripts/catalyst"
      - "plugins/dev/scripts/catalyst-linear"
      - "plugins/dev/scripts/catalyst-stack"
      - "plugins/dev/scripts/install-cli.sh"
      - "plugins/dev/scripts/check-setup.sh"
      - "plugins/dev/scripts/__tests__/**"
      # CTL-1387: the CLI-reference generator + the page it drives are guarded by
      # cli-reference-drift.test.sh below; a change to either must run this suite.
      - "plugins/dev/scripts/gen-cli-reference.sh"
      - "website/src/content/docs/reference/catalyst-cli.md"
      - ".github/workflows/execution-core-tests.yml"
  push:
    branches: [main]
    paths:
      - "plugins/dev/scripts/execution-core/**"
      # CTL-1348: the updater safety tests (updater/plugin-pull-defer.test.mjs) import and
      # gate the broker cutover invariant in broker/plugin-refresh.mjs, so a PR touching
      # only the broker must run this suite too (Codex P2).
      - "plugins/dev/scripts/broker/**"
      # CTL-1369: launcher / router / CLI-registration entry path (see PR-trigger note above).
      - "plugins/dev/scripts/catalyst-install"
      - "plugins/dev/scripts/catalyst"
      - "plugins/dev/scripts/catalyst-linear"
      - "plugins/dev/scripts/catalyst-stack"
      - "plugins/dev/scripts/install-cli.sh"
      - "plugins/dev/scripts/check-setup.sh"
      - "plugins/dev/scripts/__tests__/**"
      # CTL-1387: see the pull_request note above.
      - "plugins/dev/scripts/gen-cli-reference.sh"
      - "website/src/content/docs/reference/catalyst-cli.md"
      - ".github/workflows/execution-core-tests.yml"

jobs:
  execution-core-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/dev/scripts/execution-core

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install broker dependencies (CTL-1473)
        # The stable-unit-tests step runs ../broker/plugin-refresh.test.mjs, which
        # imports broker/router.mjs -> broker/config.mjs. Unlike execution-core/config.mjs
        # (pino-optional via a try/catch console shim), broker/config.mjs does a hard
        # top-level `import pino from "pino"`. Node/bun resolves that from broker/'s
        # location upward, so the job-default `bun install` in execution-core/ never
        # satisfies it. Install broker/ deps so pino resolves for the broker import chain.
        working-directory: plugins/dev/scripts/broker
        run: bun install

      - name: Verify import graph (bun build resolution check)
        # CTL-1298: resolve daemon.mjs's full transitive import graph so a missing
        # named export (the CTL-1093 outage: getCatalystRepoDir added to daemon.mjs
        # without an export in config.mjs) fails CI before merge. daemon.mjs is not
        # imported by any included test (daemon.test.mjs is excluded for fs.watch
        # flakiness), so its import graph is otherwise never validated. bun build
        # walks the static graph and exits non-zero on any unresolved import without
        # executing the code; it transitively covers index.mjs -> monitor.mjs too.
        run: bun build daemon.mjs --target=node --outfile /dev/null

      - name: Verify updater import graph (bun build resolution check)
        # CTL-1348: the standalone catalyst-updater agent (updater/updater.mjs) is NOT
        # in daemon.mjs's import graph — it's a separate launchd entrypoint — so a bad
        # cross-tree import (../broker/plugin-refresh.mjs, ../tracing.mjs, getNodeClass)
        # would otherwise only fail at launchd runtime on a node. Walk its static graph.
        run: bun build updater/updater.mjs --target=node --outfile /dev/null

      - name: Verify install-lifecycle import graph (bun build resolution check)
        # CTL-1369 PR3: the catalyst-install lifecycle driver (install-lifecycle.mjs) is a
        # separate CLI entrypoint (the catalyst-install bash launcher execs it), NOT in
        # daemon.mjs's import graph — so a bad cross-module import (./lib/install-telemetry.mjs,
        # ./config.mjs, ../tracing.mjs) would otherwise only fail at install runtime on a node.
        # Walk its static graph.
        run: bun build install-lifecycle.mjs --target=node --outfile /dev/null

      - name: Verify service-manifest import graph (bun build resolution check, CTL-1473)
        # CTL-1473: service-manifest.mjs is the per-class service truth consumed by
        # install-lifecycle.mjs and doctor.mjs. It has no heavy runtime deps (pure
        # constants + helpers), so a bad import silently breaks both consumers. Walk
        # its static graph before merge.
        run: bun build service-manifest.mjs --target=node --outfile /dev/null

      - name: Verify catalyst-linear import graph (node-loadability contract, CTL-1391)
        # CTL-1391: linear-cli.mjs is the catalyst-linear driver, a separate CLI entrypoint
        # NOT in daemon.mjs's graph. Its node-loadability is load-bearing — the write-reject +
        # linearis-fallback paths must load under node (worker/dev hosts without bun), which is
        # why bun:sqlite + @catalyst-cloud/read-model are DYNAMIC imports. A future static
        # bun-only import would silently break that; --target=node walks the static graph and
        # exits non-zero if any bun-only import leaked into it.
        run: bun build linear-cli.mjs --target=node --outfile /dev/null

      - name: Verify cloud-sync import graph (bun build resolution check, CTL-1394)
        # CTL-1394: cloud-sync.mjs is the supervised catalyst-cloud-sync daemon, a separate
        # launchd entrypoint (cloud-sync/launch.sh execs `bun` on it) NOT in daemon.mjs's
        # graph. Walk its static graph so a bad cross-import (./config.mjs,
        # @catalyst-cloud/sdk/node) fails CI before it strands a node at launchd runtime.
        run: bun build cloud-sync.mjs --target=node --outfile /dev/null

      - name: catalyst-install launcher + router smoke test
        # CTL-1369 PR3: exercises the REAL catalyst-install bash launcher (symlink resolution →
        # node → driver) and the `catalyst` router dispatch end-to-end via --dry-run. The mjs unit
        # suite tests the driver directly; this covers the production entry path (launcher / router /
        # CLI registration) that the unit tests bypass.
        working-directory: plugins/dev/scripts
        run: bash __tests__/catalyst-install.test.sh

      - name: CLI reference doc drift test
        # CTL-1387: asserts website/src/content/docs/reference/catalyst-cli.md
        # documents EXACTLY install-cli.sh's CLI_ENTRIES (and that the page, the
        # gen-cli-reference.sh manifest, and CLI_ENTRIES agree) — so adding a CLI
        # without documenting it fails CI. Pure string assertions; runs no CLIs.
        working-directory: plugins/dev/scripts
        run: bash __tests__/cli-reference-drift.test.sh

      - name: catalyst-stack cloud-sync plist render test
        # CTL-1394: unit-tests the PURE render_cloud_sync_plist (KeepAlive shape,
        # no StartInterval, and the secret-hygiene invariant that the world-readable
        # plist carries no token). Pure string assertions; installs nothing.
        working-directory: plugins/dev/scripts
        run: bash __tests__/catalyst-stack-cloud-sync-plist.test.sh

      - name: linear-read-replica helper test (CTL-1397 + CTL-1403)
        # CTL-1403: the bash linear_read_ticket helper is the canonical agent read
        # path; this asserts its two-gate freshness + the reads-by-source emit
        # (catalyst.linear.read on every branch: replica HIT / miss / stale / failure).
        working-directory: plugins/dev/scripts
        run: bash __tests__/linear-read-replica.test.sh

      - name: canonical-event builder test (CTL-1403 linear.read.* attrs)
        # Covers build_canonical_line incl. the CTL-1403 --linear-read-* attribute
        # flags (source/result/op top-level attrs + numeric age_ms).
        working-directory: plugins/dev/scripts
        run: bash __tests__/canonical-event.test.sh

      - name: catalyst-stack shipper ephemeral-path guard test (CTL-1473)
        # CTL-1473: guards that install-services (--print and real) refuses to bake
        # an ephemeral config path (worktree or /tmp). Uses CATALYST_FORCE_BAKE_DIR +
        # CATALYST_LAYER2_CONFIG_FILE seams; no launchctl calls.
        working-directory: plugins/dev/scripts
        run: bash __tests__/catalyst-stack-shipper-guard.test.sh

      - name: orphan-sweep wf_* and plugin-source root tests (CTL-1473)
        # CTL-1473: wf_* worktrees idle > SWEEP_WF_STALE_DAYS are classified SAFE
        # (not SALVAGE_UNPUSHED); discover_worktree_roots includes SWEEP_PLUGIN_SOURCE_WT.
        working-directory: plugins/dev/scripts
        run: bash __tests__/orphan-sweep.test.sh

      - name: Run stable unit tests
        # EXCLUDED SUITES — do NOT add these back without fixing the underlying
        # timing / sandbox incompatibility:
        #
        # daemon.test.mjs
        #   Contains "reconciles when the registry changes (debounced)" which
        #   uses watchRegistry:true + fs.watch. fs.watch delivery latency under
        #   CI load makes the debounce window non-deterministic.
        #   Memory ref: project_execution_core_daemon_flaky_test
        #
        # scheduler.test.mjs
        #   Contains a large suite of "debounced tick" tests (debounceMs seam).
        #   These drive real timers and fs.watch; flake deterministically under
        #   concurrent full-suite load in a CI sandbox.
        #   Memory ref: project_execution_core_daemon_flaky_test
        #
        # integration-ctl-587.test.mjs
        #   "storm repro: many fast ticks × 5 dead workers" times out at the
        #   bun 5 000 ms default on a loaded CI runner (observed: 16 s locally
        #   under moderate load). The test drives real setInterval timing.
        #   Memory ref: project_execution_core_daemon_flaky_test
        #
        # monitor.test.mjs
        #   "CTL-716 burst budget — 7 Triage events drained in ONE pass" times
        #   out at 9 s locally under load (bun default 5 000 ms). The test
        #   relies on real-time event-log delivery latency.
        #   Memory ref: project_execution_core_daemon_flaky_test
        run: |
          bun test \
            beliefs/advance-rules.test.mjs \
            beliefs/advance-shadow.test.mjs \
            beliefs/collector-advance.test.mjs \
            beliefs/collector-relation.test.mjs \
