  <g fill="none" stroke="#58A6FF" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M 8 44 L 32 20 L 56 44"/>
    <path d="M 18 52 L 32 36 L 46 52" stroke-width="4" opacity="0.75"/>
  </g>
</svg>
