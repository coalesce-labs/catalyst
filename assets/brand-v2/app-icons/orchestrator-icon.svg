<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="512" height="512" role="img" aria-label="Catalyst Orchestrator">
  <title>Catalyst Orchestrator</title>
  <!-- Operator Console: SURFACE #0B0D10, accent = Operator Console "info" #58A6FF
       (the system/control-plane blue — sibling to the workers app's Signal Amber #FFB547). -->
